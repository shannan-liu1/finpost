model:
  base_model_id: Qwen/Qwen2.5-1.5B
  dtype: bfloat16
  use_safetensors: true
data:
  sources:
    - finchain
  val_split_pct: 5.0
  seed: 42
training:
  max_steps: 1000
  warmup_steps: 100
  lr: 2.0e-5
  weight_decay: 0.01
  grad_accum_steps: 8
  grad_clip: 1.0
  val_every_n_steps: 100
  checkpoint_every_n_steps: 250
  per_device_batch_size: 2
  dataloader_num_workers: 2
  pin_memory: true
packing:
  max_seq_len: 1536
  isolate_documents: true
logging:
  wandb_project: finpost-finchain-sft
  run_name: qwen25-1p5b-finchain-sft
checkpointing:
  save_dir: results/checkpoints/qwen25-1p5b-finchain-sft
  retention_last_n: 4
  resume_from: null

model:
  policy_checkpoint: results/checkpoints/qwen-combined-2000s-a40-step2000-hf
  reference_checkpoint: results/checkpoints/qwen-combined-2000s-a40-step2000-hf
  dtype: bfloat16
  use_safetensors: true
data:
  pairs_path: results/dpo_pairs/qwen_combined_2000s_a40_k8_v1/pairs.jsonl
  manifest_path: results/dpo_pairs/qwen_combined_2000s_a40_k8_v1/manifest.json
  seed: 42
dpo:
  beta: 0.1
training:
  max_steps: 1000
  warmup_steps: 100
  lr: 5.0e-6
  weight_decay: 0.01
  grad_accum_steps: 8
  grad_clip: 1.0
  checkpoint_every_n_steps: 250
  per_device_pair_batch_size: 2
packing:
  max_seq_len: 1024
logging:
  wandb_project: finpost-phase1-dpo-runpod
  run_name: qwen-combined-2000s-a40-dpo
checkpointing:
  save_dir: results/checkpoints/qwen-combined-2000s-a40-dpo
  retention_last_n: 4
  resume_from: null

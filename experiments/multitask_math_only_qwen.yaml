# Multi-task transfer ablation — Qwen2.5-0.5B trained on MATH alone.
# This is the MATH-ONLY arm of the three-arm comparison documented in
# `notebooks/sft_phase1_multitask.ipynb`.
#
# Run with (in the Colab notebook):
#   !python -m finpost.training.train \
#       --config experiments/multitask_math_only_qwen.yaml --device cuda
#
# Hyperparameters MUST match `multitask_combined_qwen.yaml` exactly —
# only `data.sources` differs. See the comment in the combined config
# for why uniformity matters across arms.

model:
  base_model_id: Qwen/Qwen2.5-0.5B
  dtype: bfloat16
  use_safetensors: true

data:
  # MATH only — this is the SPECIALIST arm for the harder benchmark.
  sources: [math]
  val_split_pct: 5.0
  seed: 42

training:
  max_steps: 500
  warmup_steps: 50
  lr: 2.0e-5
  weight_decay: 0.01
  grad_accum_steps: 4
  grad_clip: 1.0
  val_every_n_steps: 100
  checkpoint_every_n_steps: 250
  per_device_batch_size: 4

packing:
  max_seq_len: 1024
  isolate_documents: true

logging:
  wandb_project: finpost-phase1-multitask
  run_name: multitask-math-only-qwen-500m

checkpointing:
  save_dir: results/checkpoints/multitask-math-only-qwen-500m
  retention_last_n: 2
  resume_from: null
